# Actions pinned to commit SHAs. Dependabot keeps them updated weekly — see .github/dependabot.yml.
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  # ---------------------------------------------------------------------------
  # Test jobs — each test category runs on its own runner for maximum
  # parallelism. Coverage data is uploaded as artifacts and combined in the
  # ``coverage`` job below.
  # ---------------------------------------------------------------------------

  test-unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run unit tests
        run: uv run pytest -m "unit and not playwright" --cov --cov-report=
      - name: Upload coverage data
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-unit
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run integration tests
        run: uv run pytest -m "integration and not playwright" --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-integration
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-property:
    name: Property
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run property-based tests
        run: uv run pytest -m property --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-property
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-snapshot:
    name: Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run snapshot tests
        # ``--snapshot-details`` fails on stale snapshots.
        run: uv run pytest -m "snapshot and not playwright" --snapshot-details --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-snapshot
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-packaging:
    name: Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run packaging tests
        run: uv run pytest -m packaging --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-packaging
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-playwright:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies (incl. Playwright extra)
        run: uv sync --extra dev --extra playwright
      - name: Install Chromium for Playwright
        # ``--with-deps`` installs the system shared libraries Chromium
        # needs to run headless under Ubuntu's minimal container image.
        run: uv run playwright install chromium --with-deps
      - name: Run Playwright-marked tests
        # ``-o asyncio_mode=strict`` avoids the session event loop that
        # trips Playwright's sync-API guard.
        run: uv run pytest -m playwright -v -o asyncio_mode=strict --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: coverage-playwright
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Coverage — combine data from all test jobs and enforce thresholds.
  # ---------------------------------------------------------------------------

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-integration
      - test-property
      - test-snapshot
      - test-packaging
      - test-playwright
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Download all coverage artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: coverage-*
          merge-multiple: false
      - name: Combine coverage data
        run: |
          # Each artifact is downloaded into its own directory. Move the
          # .coverage files into the workspace root with unique names so
          # ``coverage combine`` can merge them.
          i=0
          for f in coverage-*/.coverage; do
            cp "$f" ".coverage.$i"
            i=$((i + 1))
          done
          uv run coverage combine
      - name: Coverage report
        # Display the combined report and enforce the global ``fail_under``
        # threshold configured in pyproject.toml.
        run: uv run coverage report
      - name: Per-module coverage gate
        # Enforce the per-module ≥90% gate against the combined data,
        # reusing the threshold map from tests/conftest.py.
        run: |
          uv run python - <<'PYEOF'
          import sys
          sys.path.insert(0, ".")
          from tests.conftest import _module_combined_coverage, _CRITICAL_MODULE_COVERAGE_THRESHOLDS
          import coverage as cov_mod
          cov = cov_mod.Coverage(data_file=".coverage")
          cov.load()
          ok = True
          for mod, threshold in _CRITICAL_MODULE_COVERAGE_THRESHOLDS.items():
              pct = _module_combined_coverage(cov, mod)
              if pct is None:
                  print(f"FAIL  {mod}: no coverage data")
                  ok = False
              elif pct < threshold:
                  print(f"FAIL  {mod}: {pct:.1f}% < {threshold:.0f}%")
                  ok = False
              else:
                  print(f"OK    {mod}: {pct:.1f}% >= {threshold:.0f}%")
          if not ok:
              sys.exit(1)
          print("All per-module coverage gates passed.")
          PYEOF

  markdownlint:
    name: Markdownlint (fixture output)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Render fixture corpus to Markdown
        # Renders each HTML fixture to ``build/fixture_md/<name>.md``.
        run: uv run python scripts/render_fixtures.py
      - name: Run markdownlint
        # Lint failure = pipeline output drifted from the AI-readable contract.
        run: npx --yes markdownlint-cli2@0.17.2 'build/fixture_md/*.md'

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install project dependencies
        run: uv sync
      - name: Run pip-audit
        # Audit installed packages for known vulnerabilities.
        run: uv run --with pip-audit pip-audit
