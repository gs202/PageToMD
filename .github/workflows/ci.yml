# Actions pinned to commit SHAs. Dependabot keeps them updated weekly — see .github/dependabot.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pre-commit
        # First pass lets auto-fix hooks (ruff --fix, ruff-format) modify
        # files. Second pass verifies everything is clean. This two-pass
        # approach avoids false failures from auto-fix-only hooks.
        run: uv run pre-commit run --all-files || uv run pre-commit run --all-files

  # ---------------------------------------------------------------------------
  # Test jobs — each test category runs on its own runner for maximum
  # parallelism. Coverage data is uploaded as artifacts and combined in the
  # ``coverage`` job below.
  # ---------------------------------------------------------------------------

  test-unit:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run unit tests
        run: uv run pytest -m "unit and not playwright" -n auto --dist=loadscope --cov --cov-report=
      - name: Upload coverage data
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-unit
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run integration tests
        run: uv run pytest -m "integration and not playwright" -n auto --dist=loadscope --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-integration
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-property:
    name: Property
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run property-based tests
        run: uv run pytest -m property -n auto --dist=loadscope --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-property
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-snapshot:
    name: Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run snapshot tests
        # ``--snapshot-details`` fails on stale snapshots.
        run: uv run pytest -m "snapshot and not playwright" -n auto --dist=loadscope --snapshot-details --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-snapshot
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-packaging:
    name: Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run packaging tests
        run: uv run pytest -m packaging -n auto --dist=loadscope --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-packaging
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  test-playwright:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies (incl. Playwright extra)
        run: uv sync --extra dev --extra playwright
      - name: Install Chromium for Playwright
        # ``--with-deps`` installs the system shared libraries Chromium
        # needs to run headless under Ubuntu's minimal container image.
        run: uv run playwright install chromium --with-deps
      - name: Run Playwright-marked tests
        run: uv run pytest -m playwright -v -n auto --dist=loadscope --cov --cov-report=
      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-playwright
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Coverage — combine data from all test jobs and enforce thresholds.
  # ---------------------------------------------------------------------------

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-integration
      - test-property
      - test-snapshot
      - test-packaging
      - test-playwright
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Download all coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: coverage-*
          merge-multiple: false
      - name: Combine coverage data
        run: |
          # Each artifact is downloaded into its own directory. Move the
          # .coverage files into the workspace root with unique names so
          # ``coverage combine`` can merge them.
          i=0
          for f in coverage-*/.coverage; do
            cp "$f" ".coverage.$i"
            i=$((i + 1))
          done
          uv run coverage combine
      - name: Coverage report
        # Display the combined report and enforce the global 85% threshold.
        # This is set explicitly here (not in pyproject.toml) so that
        # individual per-category ``pytest --cov`` jobs don't trip over
        # the gate when they only run a subset of the test suite.
        run: uv run coverage report --fail-under=85
      - name: Per-module coverage gate
        # Enforce the per-module ≥90% gate against the combined data,
        # reusing the threshold map from tests/conftest.py.
        run: |
          uv run python - <<'PYEOF'
          import sys
          sys.path.insert(0, ".")
          from tests.conftest import _module_combined_coverage, _CRITICAL_MODULE_COVERAGE_THRESHOLDS
          import coverage as cov_mod
          cov = cov_mod.Coverage(data_file=".coverage")
          cov.load()
          ok = True
          for mod, threshold in _CRITICAL_MODULE_COVERAGE_THRESHOLDS.items():
              pct = _module_combined_coverage(cov, mod)
              if pct is None:
                  print(f"FAIL  {mod}: no coverage data")
                  ok = False
              elif pct < threshold:
                  print(f"FAIL  {mod}: {pct:.1f}% < {threshold:.0f}%")
                  ok = False
              else:
                  print(f"OK    {mod}: {pct:.1f}% >= {threshold:.0f}%")
          if not ok:
              sys.exit(1)
          print("All per-module coverage gates passed.")
          PYEOF

  markdownlint:
    name: Markdownlint (fixture output)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Render fixture corpus to Markdown
        # Renders each HTML fixture to ``build/fixture_md/<name>.md``.
        run: uv run python scripts/render_fixtures.py
      - name: Run markdownlint
        # Lint failure = pipeline output drifted from the AI-readable contract.
        run: npx --yes markdownlint-cli2@0.17.2 'build/fixture_md/*.md'

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Install project dependencies
        run: uv sync
      - name: Run pip-audit
        # Audit installed packages for known vulnerabilities.
        run: uv run --with pip-audit pip-audit
