# Actions pinned to commit SHAs. Dependabot keeps them updated weekly — see .github/dependabot.yml.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Default permissions are read-only; individual jobs widen as needed.
permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # fetch-depth: 0 is required so hatch-vcs can see the tag and
          # derive ``__version__`` from it. With a shallow clone the
          # version would fall back to the dev marker.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Verify the built wheel
        # ``uv run --isolated --with <wheel>`` spins up a throwaway
        # environment containing only the wheel + its declared deps, so
        # this proves the wheel is self-contained and the entry point
        # resolves end-to-end. The grep ensures the printed version
        # matches the tag we just built from.
        run: |
          set -euxo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT=$(uv run --isolated --with dist/pagetomd-*.whl pagetomd --version)
          echo "wheel reported: ${OUTPUT}"
          echo "${OUTPUT}" | grep -F "pagetomd ${TAG_VERSION}"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # ``id-token: write`` is MANDATORY for PyPI Trusted Publishing — it
    # lets the runner mint a short-lived OIDC token PyPI can verify
    # against the publisher config without any long-lived secrets.
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/pagetomd/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for this tag
        id: changelog
        # Pull the section between ``## [X.Y.Z]`` and the next ``## [``
        # heading out of CHANGELOG.md. The awk script writes to a file so
        # we can stream it through GITHUB_OUTPUT using the heredoc
        # protocol (handles arbitrary multi-line content safely).
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="${TAG_VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release_body.md
          {
            echo "body<<RELEASE_BODY_EOF"
            cat release_body.md
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: dist/*
